<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-dark text-light">
    <header class="navbar navbar-expand-lg bd-navbar sticky-top">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark container-xxl bd-gutter flex-wrap flex-lg-nowrap">
            <a class="navbar-brand" href="#">Nome do Sistema</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/membros">Membros</a>
                    </li>
                </ul>
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="form-inline">
                            <button type="submit" class="btn btn-link nav-link">Sair</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>
    </header>
    <div class="container mt-4">
        <nav aria-label="breadcrumb text-light">
            <ol class="breadcrumb text-light">
                <li class="breadcrumb-item active text-light" aria-current="page">Página Inicial</li>
            </ol>
        </nav>
        <div class="card bg-dark text-light">
            <div class="card-header">
                <h2 class="form-signin-heading">Olá, você está logado!</h2>
            </div>
            <div class="card-body">
                <p>Seu nome de usuário: <span th:text="${username}"></span></p>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-primary btn-block">Sair</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
