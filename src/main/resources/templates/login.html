<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"/>
</head>
<body class="bg-light d-flex justify-content-center align-items-center" style="height: 100vh; margin: 0;">
    <div class="container d-flex justify-content-center align-items-center" style="height: 100%;">
        <div class="card" style="width: 20rem;">
            <div class="card-header">
                <h2 class="form-signin-heading">Login</h2>
            </div>
            <div class="card-body">
                <form th:action="@{/login}" method="post" class="form-signin">
                    <div th:if="${param.error}">
                        <p style="color: red;" th:text="${param.error}">Credenciais inválidas. Por favor, tente novamente.</p>
                    </div>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" class="form-control" />
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control" />
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
            </div>
            <div class="card-footer">
                <p><a th:href="@{/usuario/registrar}">Criar novo usuário</a></p>
            </div>
        </div>
    </div>
</body>
</html>
