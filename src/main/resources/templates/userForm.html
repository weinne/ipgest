<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body class="bg-light d-flex justify-content-center align-items-center" style="height: 100vh; margin: 0;">
    <div class="container d-flex justify-content-center align-items-center" style="height: 100%;">
        <div class="card" style="width: 20rem;">
            <div class="card-header">
                <h2 class="form-signin-heading">Register</h2>
            </div>
            <div class="card-body">
                <form th:action="@{/usuario/registrar}" method="post">
                    <div class="form-group">
                        <label for="username">Username:</label>
                        <input type="text" id="username" name="username" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password:</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="text" id="email" name="email" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label for="roles">Roles:</label>
                        <select id="roles" name="roles" class="form-control" multiple>
                            <option value="ROLE_ADMIN">Admin</option>
                            <option value="ROLE_USER">User</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Register</button>
                </form>
            </div>
            <div class="card-footer">
                <p><a th:href="@{/login}">Fazer login</a></p>
            </div>
        </div>
    </div>
</body>
</html>
