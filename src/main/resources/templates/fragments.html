<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fragments</title>
</head>
<body>
    <div th:fragment="header">
        <header class="navbar navbar-expand-lg bd-navbar sticky-top">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark container-xxl bd-gutter flex-wrap flex-lg-nowrap">
                <a class="navbar-brand" href="#">Nome do Sistema</a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="/igreja">Igrejas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/membro">Membros</a>
                        </li>
                    </ul>
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item">
                            <!-- A lista de igrejas deve ser fornecida pelo backend e passada para o modelo -->
                            <select class="form-control" id="igrejaSelector" th:field="*{selectedIgreja.id}">
                                <option th:each="igreja : ${igrejas}" th:value="${igreja.id}" th:text="${igreja.nome}"></option>
                            </select>
                        </li>
                        <li class="nav-item">
                            <form th:action="@{/logout}" method="post" class="form-inline">
                                <button type="submit" class="btn btn-link nav-link">Sair</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </nav>
        </header>
    </div>

    <div th:fragment="footer"></div>
        <footer class="footer bg-dark text-white text-center py-3">
            <p>© 2023 Nome do Sistema</p>
        </footer>
    </div>
</body>
</html>
