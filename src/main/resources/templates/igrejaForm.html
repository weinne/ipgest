<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body class="bg-light d-flex justify-content-center align-items-center" style="height: 100vh; margin: 0;">
    <div class="container d-flex justify-content-center align-items-center" style="height: 100%;">
        <div class="card" style="width: 20rem;">
            <div class="card-header">
                <h2 class="form-signin-heading">Nova Igreja</h2>
            </div>
            <div class="card-body">
                <form th:action="@{/igreja/registrar}" method="post">
                    <div class="form-group">
                        <label for="nome">Nome da Igreja:</label>
                        <input type="text" id="nome" name="nome" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="endereco">Endereço:</label>
                        <input type="text" id="endereco" name="endereco" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="cidade">Cidade:</label>
                        <input type="text" id="cidade" name="cidade" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="estado">Estado:</label>
                        <input type="text" id="estado" name="estado" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="cep">CEP:</label>
                        <input type="text" id="cep" name="cep" class="form-control" required pattern="\d{5}-\d{3}" placeholder="12345-678" data-mask="00000-000">
                    </div>
                    <div class="form-group">
                        <label for="cnpj">CNPJ:</label>
                        <input type="text" id="cnpj" name="cnpj" class="form-control" required pattern="\d{2}\.\d{3}\.\d{3}/\d{4}-\d{2}" placeholder="12.345.678/0001-12" data-mask="00.000.000/0000-00">
                    </div>
                    <div class="form-group">
                        <label for="dataOrganizacao">Data de Organização:</label>
                        <input type="date" id="dataOrganizacao" name="dataOrganizacao" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="presbiterio">Presbitério:</label>
                        <input type="text" id="presbiterio" name="presbiterio" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                </form>
            </div>
            <div class="card-footer">
                <p><a th:href="@{/login}">Fazer login</a></p>
            </div>
        </div>
    </div>
</body>
</html>
