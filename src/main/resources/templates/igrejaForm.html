<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Igreja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        $(document).ready(function(){
            $('#cep').mask('00000-000');
            $('#cnpj').mask('00.000.000/0000-00');
        });
    </script>
</head>
<body class="bg-dark text-light">
    <div th:replace="~{fragments :: header}"></div>
    <div class="container mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item active" aria-current="page">Página Inicial</li>
            </ol>
        </nav>
        <div class="card bg-dark">
            <div class="card-header">
                <h2 class="form-signin-heading">Cadastro de Igreja</h2>
            </div>
            <div class="card-body">
                <div th:if="${error}" class="alert alert-danger" role="alert">
                    <p th:text="${error}"></p>
                </div>
                <form th:action="@{/igreja/save}" th:object="${igreja}" method="post">
                    <input type="hidden" id="id" name="id" th:value="${entity.id}">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome da Igreja:</label>
                        <input type="text" class="form-control" id="nome" name="nome" th:value="${entity.nome}" required>
                    </div>
                    <div class="mb-3">
                        <label for="endereco" class="form-label">Endereço:</label>
                        <input type="text" class="form-control" id="endereco" name="endereco" th:value="${entity.endereco}" required>
                    </div>
                    <div class="mb-3">
                        <label for="cidade" class="form-label">Cidade:</label>
                        <input type="text" class="form-control" id="cidade" name="cidade" th:value="${entity.cidade}" required>
                    </div>
                    <div class="mb-3">
                        <label for="estado" class="form-label">Estado:</label>
                        <input type="text" class="form-control" id="estado" name="estado" th:value="${entity.estado}" required>
                    </div>
                    <div class="mb-3">
                        <label for="cep" class="form-label">CEP:</label>
                        <input type="text" class="form-control" id="cep" name="cep" th:value="${entity.cep}" placeholder="00000-000" pattern="\d{5}-\d{3}" required>
                    </div>
                    <div class="mb-3">
                        <label for="cnpj" class="form-label">CNPJ:</label>
                        <input type="text" class="form-control" id="cnpj" name="cnpj" th:value="${entity.cnpj}" placeholder="00.000.000/0000-00" pattern="\d{2}\.\d{3}\.\d{3}/\d{4}-\d{2}" required>
                    </div>
                    <div class="mb-3">
                        <label for="dataOrganizacao" class="form-label">Data de Organização:</label>
                        <input type="date" class="form-control" id="dataOrganizacao" name="dataOrganizacao" th:value="${entity.dataOrganizacao}" required>
                    </div>
                    <div class="mb-3">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-select" id="status" name="status" th:value="${entity.status}" required>
                            <option value="" disabled selected>Selecione o status</option>
                            <option value="CONGREGACAO">Congregação</option>
                            <option value="CONGREGACAO_PRESBITERIAL">Congregação Presbiterial</option>
                            <option value="IGREJA_ATIVA">Igreja Ativa</option>
                            <option value="PONTO_DE_PREGACAO">Ponto de Pregação</option>
                            <option value="INATIVA">Inativa</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="presbiterio" class="form-label">Presbitério:</label>
                        <input type="text" class="form-control" id="presbiterio" name="presbiterio" th:value="${entity.presbiterio}" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </form>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
